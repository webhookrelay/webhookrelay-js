name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELAY_API_KEY: ${{ secrets.RELAY_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run live API integration tests
        if: env.RELAY_API_KEY != ''
        run: npm run test:integration
      - name: Skip live API integration tests
        if: env.RELAY_API_KEY == ''
        run: echo "RELAY_API_KEY is not available; skipping live API integration tests."
