        type: array
      bucket_id:
        description: BucketID is a foreign key
        type: string
      created_at:
        type: integer
      created_by:
        type: string
      custom_domain:
        description: |-
          Input's domain name, can be set to work with the CNAMEs
          so WHR will fetch a cert from LE
          (make sure you create a CNAME DNS record for your domain to stats.uptimerobot.com.
          And, it can take up to 30 mins for the custom domain to be activated.)
        type: string
      description:
        type: string
      function_id:
        type: string
      headers:
        allOf:
        - $ref: '#/definitions/structs.Headers'
        description: response details
      id:
        type: string
      legacy_tls:
        description: |-
          LegacyTLS widens the accepted handshake to TLS 1.0/1.1 *and* the
          older RSA/CBC cipher set. The two used to be split into separate
          fields but the policy resolver applies them as one logical toggle,
          and the dashboard surfaces them as one switch — keep the on-disk
          shape matching that single concept.
        type: boolean
      name:
        type: string
      path_prefix:
        description: PathPrefix only works when CustomDomain is set
        type: string
      response_from_output:
        description: |-
          either output ID or "anyOutput" to indicate that the first response
          from any output is good enough. Empty string
        type: string
      status_code:
        type: integer
      strip_path_prefix:
        description: |-
          StripPathPrefix indicates whether full path should be included when
          forwarding the webhook. If the path prefix is /abc and the webhook
          arrives at /abc/foo, then by default the full path will be /abc/foo
        type: boolean
      tls_version:
        description: |-
          TLSVersion sets the minimum accepted TLS version for this input's HTTPS endpoint. It is a floor, not a pin: handshakes negotiate this version or any higher one the backend allows (for example 1.1 still accepts 1.2 and 1.3).
          Empty value means default hardened policy.
