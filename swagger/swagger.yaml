  api.logsHistogramBucketJSON:
    properties:
      counts:
        additionalProperties:
          type: integer
        type: object
      latency_ms_avg:
        type: number
      max_retries:
        type: integer
      minute:
        type: integer
      retried:
        description: |-
          Retry-pressure overlay. With durable delivery on, latest-status
          alone drifts to "all sent"; these counters keep outages visible
          in the chart. See design §6.10.9.
        type: integer
      retry_count:
        type: integer
      total:
        type: integer
    type: object
  api.logsHistogramResponse:
    properties:
      buckets:
        items:
          $ref: '#/definitions/api.logsHistogramBucketJSON'
        type: array
      resolution:
        description: |-
          Resolution echoes back the bucket size returned by the selected
          histogram tier.
        type: string
    type: object
  api.logsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/structs.Log'
        type: array
      limit:
        type: integer
      next_cursor:
        description: |-
          NextCursor is the opaque token a caller passes back as
          ?cursor=... to get the next page. Emitted only when the
          caller used cursor mode (or asked for it via the flag) AND
          there is at least one more row past the current page. Empty
          otherwise — clients should detect end-of-stream by an empty
          NextCursor or a short final page.
        type: string
      offset:
        type: integer
      total:
        type: integer
      truncated:
        description: |-
          Truncated is true when the storage layer capped the candidate
          segment set (post-manifest-prune) to its scan budget. The
          returned Data still contains the newest matching rows (sort
          order is newest-first), but older entries within the requested
          [from, to] window may have been omitted. The UI should render
          a "showing latest results — narrow the time range to see more"
          banner so users on hot/bloated accounts don't think their
          data is missing entirely. See pkg/turbostore/querylimit and
          design.md §15.17. Omitted from the JSON when false (the
          happy path).
        type: boolean
    type: object
  api.mfaConfirmRequest:
