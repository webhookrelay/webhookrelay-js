        type: boolean
      durability:
        allOf:
        - $ref: '#/definitions/structs.DurabilityConfig'
        description: |-
          Durability configures long-period retries via the turbostore
          pending-retry index. See pkg/turbostore/design.md §5.6.
          Stored as JSON so we can extend without a schema migration.
      function_id:
        description: |-
          FunctionID is used to indicate whethera code snippet should be used to
          modify this webhook
        type: string
      headers:
        allOf:
        - $ref: '#/definitions/structs.Headers'
        description: |-
          Headers that will overwrite any existing headers
          from the incoming request
      id:
        type: string
      internal:
        description: internal outputs will only be relayed by agents
        type: boolean
      lock_path:
        description: |-
          LockPath ensures that the request path cannot be changed from what is
          specified in the destination. For example if request is coming to /v1/webhooks/xxx/github-jenkins,
          with lock path 'false' and destination 'http://localhost:8080' it would go to http://localhost:8080/github-jenkins.
          However, with lock path 'true', it will be sent to 'http://localhost:8080'
        type: boolean
      name:
        type: string
      retries:
        description: |-
          additional retries (after the first 3 times fail). Setting
          to -1 disables retries
        type: integer
      rules:
        $ref: '#/definitions/rules.Rules'
      throttle:
        allOf:
        - $ref: '#/definitions/structs.ThrottleConfig'
        description: |-
          Throttle configures per-output throughput throttling. When enabled,
          the ingester/server stop delivering this output inline; webhooks are
          persisted (left in RequestStatusReceived) and enqueued into the
          turbostore throttle index, and the dispatcher's throttle controller
          dequeues them at the configured rate/concurrency. Stored as JSON so
          the schema can grow without a migration, same as Durability.
      timeout:
        description: response timeout
        type: integer
      tls_verification:
        description: |-
          Controls TLS verification of the certs for public
          webhooks
        type: boolean
      updated_at:
        type: integer
    type: object
