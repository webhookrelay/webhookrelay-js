  structs.DurabilityConfig:
    properties:
      custom_delays:
        description: CustomDelays is consulted only when Schedule == "custom".
        items:
          $ref: '#/definitions/time.Duration'
        type: array
      deadline:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: |-
          Deadline caps total retry duration measured from the webhook's
          received_at timestamp. Zero falls through to a schedule-derived
          default (~30 d for "long", ~16 h for "medium", ~25 min for
          "seconds").
      enabled:
        description: Enabled toggles the whole feature for this output.
        type: boolean
      handoff_after:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: |-
          HandoffAfter is the attempt-age threshold past which a failing
          delivery is moved from the in-pubsub retry path to the durable
          pending index. Zero falls through to 15 minutes — short enough
          that long retries don't bloat the pubsub backlog, long enough
          that transient blips don't pay an extra object-store PUT.
      schedule:
        description: |-
          Schedule names a backoff preset ("seconds", "medium", "long",
          "custom"). Empty falls through to "long" when Enabled, "seconds"
          otherwise. Custom backoffs use CustomDelays.
        type: string
    type: object
